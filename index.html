<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aquila Leite Mendes</title>
  <style>
    body {
      margin: 0;
      /* Fonte moderna e limpa */
      font-family: Inter, system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      /* Cores de alto contraste e descanso visual */
      background-color: #0f172a; 
      color: #e2e8f0;
      /* Centralização total na tela */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    
    h1 {
      color: #38bdf8;
      margin-bottom: 0.5rem;
    }
    
    p {
      max-width: 600px;
      margin: 0;
      opacity: 0.9;
    }

    /* Pequeno detalhe para links futuros */
    a {
      color: #38bdf8;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border 0.3s;
    }
    a:hover {
      border-bottom: 1px solid #38bdf8;
    }
  </style>
</head>
<body>

  <h1>🚀 Aquila Leite Mendes</h1>
  <p>Projetos, ferramentas e soluções em tecnologia.</p>

</body>
</html>
